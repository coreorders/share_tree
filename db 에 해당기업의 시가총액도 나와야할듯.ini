현재 우리는 한국 코스피(KOSPI) 상장사들의 지배구조(주주 지분율)를 분석하여 시각화하기 위해 SQLite 데이터베이스(

stocks.db
)를 구축하여 사용하고 있어. 네가 앞으로 이 데이터를 다루거나 확장할 때 반드시 알아야 할 데이터베이스 모델과 Python 데이터 수집 파이프라인 아키텍처를 설명해 줄게.

1. 데이터베이스 스키마 (

stocks.db
)
이 프로젝트의 DB는 철저하게 2개의 릴레이셔널 테이블로 나누어져 구축되었어.

테이블 A: companies (코스피 상장사 메타데이터) 한국거래소(KRX) 코스피에 상장된 약 840여 개의 기업 정보와 시가총액 정보가 들어 있어.

corp_code (TEXT, Primary Key): DART(전자공시시스템) 연동용 8자리 고유번호 (예: 삼성전자 '00126380')
stock_code (TEXT): KRX 6자리 티커/종목코드 (예: '005930')
corp_name (TEXT): 상장 기업명
close_price (INTEGER): 수집일 기준 종가
shares_outstanding (INTEGER): 상장 주식 수

market_cap
 (INTEGER): 시가총액 (노드 크기 계산용 파라미터로 사용)
last_updated (DATETIME): 이 상장사의 주주 정보를 마지막으로 긁어온(업데이트한) 시간
테이블 B: 

shareholders
 (주주 및 지분율 정보) 각 기업별 '최대주주 및 특수관계인'들이 소유한 지분 데이터를 담고 있어.


id
 (INTEGER, Primary Key): 자동 증가 고유 ID
target_corp_code (TEXT, Foreign Key): 지분을 소유당한(투자받은) 상장사의 DART 고유번호 (companies.corp_code와 JOIN)
shareholder_name (TEXT): 지분을 소유한 주주명 (이름 패턴을 분석해 개인, 상장사, 기관/펀드 등을 Ф론트엔드에서 렌더링 시점에 구분함)
share_rate (REAL): 기말 기준 보유 지분율 (%)
shares_count (INTEGER): 기말 기준 보유 주식 수
collected_at (DATETIME): 데이터 수집 시점
2. 데이터 수집 파이프라인 아키텍처 (execution/ 폴더)
Node.js 백엔드와 별개로, 데이터 수집은 Python 스크립트 기반 파이프라인으로 모듈화되어 있으며 

.env
에 등록된 DART_API_KEY를 사용해.


init_db.py
: 가장 처음 실행되어 SQLite DB와 위 2개의 뼈대 테이블 생성해.
STEP 1: 

fetch_kospi_list.py
 👉 pykrx 라이브러리로 코스피 전체 종목을 긁어오고, dart_fss로 DART 고유번호와 KRX 티커를 1:1 매핑시켜 companies 테이블에 먼저 뼈대(INSERT/REPLACE)를 잡아.
STEP 2: 

update_market_cap.py
 👉 역시 pykrx를 통해 가장 최근 영업일 기준의 코스피 전 종목 [시가총액, 종가, 상장주식수]를 가져와서 companies 테이블을 최신 시총으로 UPDATE 해.
STEP 3: 

fetch_all_shareholders.py
 (핵심 Crawler) 👉 DB의 companies.last_updated를 기준으로 업데이트가 가장 오래된(=과거인) 기업부터 순서대로 DART Open API (hyslrSttus.json)를 호출해. 기존 데이터를 DELETE 하고 새 데이터를 파싱/클렌징(e.g., '-', ',' 제거) 한 뒤 

shareholders
 테이블에 INSERT 해. API 한도 제한 문제로 time.sleep(0.5)가 걸려있음.

fetch_shareholders.py
: 단일 기업 테스트용 구버전 스크립트.
3. 네가 알아야 할 중요 개발 포인트 (알고리즘)
그래프 검색 및 렌더링 API: A기업(target_corp_code)의 지분을 가진 B주주(shareholder_name)를 쿼리할 뿐만 아니라, 역으로 **[B주주가 지분을 투자한 다른 모든 상장사 목록]**을 알아낼 수 있도록 

shareholders
 테이블을 양방향 BFS(Breadth-First Search)로 쿼리해야 해.
사용자의 설정에 따라 지분율(%) Cut-off와 연결 촌수(Depth)를 동적으로 제한해야 하므로, 데이터 파이프라인과 API End-point 간의 최적화된 SQL 연산이 필수적이야.
이 구조와 수집 레이어를 건드리지 않는 선에서 프론트엔드나 추가 기능을 확장해 줘.



