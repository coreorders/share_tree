name: Daily ShareGraph Data Update & Deploy

on:
  push:
    branches:
      - main
  schedule:
    # Run at 38 minutes past the hour from 09:00 to 17:00 KST (00:00 to 08:00 UTC)
    - cron: '38 0-8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pykrx pandas dart-fss python-dotenv

      - name: Initialize DB (if missing)
        run: python execution/init_db.py

      - name: Update Market Cap & Close Price (KOSPI & KOSDAQ)
        run: python execution/update_market_cap.py

      - name: Export JSON for Frontend
        run: python export_json.py
        env:
          NEXT_PUBLIC_GAS_URL: ${{ secrets.NEXT_PUBLIC_GAS_URL }}

      - name: Commit and Push DB and json changes
        continue-on-error: true
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add web/stocks.db web/public/data.json
          git commit -m "Auto-update stock data [skip ci]"
          git push

      - name: Upload exported JSON as artifact for next job
        uses: actions/upload-artifact@v4
        with:
          name: frontend-json-data
          path: web/public/data.json
          retention-days: 1

  build-and-deploy:
    needs: update-data
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_GAS_URL: ${{ secrets.NEXT_PUBLIC_GAS_URL }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Download JSON Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-json-data
          path: web/public/

      - name: Install Node Dependencies
        working-directory: ./web
        run: npm ci

      - name: Create .env.local for Build
        working-directory: ./web
        run: |
          echo "NEXT_PUBLIC_GAS_URL=${{ secrets.NEXT_PUBLIC_GAS_URL }}" > .env.local

      - name: Build Next.js
        working-directory: ./web
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
