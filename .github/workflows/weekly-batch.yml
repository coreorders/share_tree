name: Weekly Batch Data Collection

on:
  schedule:
    # Every Sunday at 06:39 UTC = 15:39 KST
    - cron: '39 6 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pykrx pandas dart-fss python-dotenv

      - name: Initialize DB (if missing)
        run: python execution/init_db.py

      - name: Run Unified Weekly Data Collection
        run: python execution/fetch_weekly_all.py
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}

      - name: Export JSON for Frontend
        run: python export_json.py
        env:
          NEXT_PUBLIC_GAS_URL: ${{ secrets.NEXT_PUBLIC_GAS_URL }}

      - name: Commit and Push DB and JSON changes
        continue-on-error: true
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add web/stocks.db web/public/data.json
          git commit -m "Weekly batch data update [skip ci]"
          git push
